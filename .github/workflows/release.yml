name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build gaia.exe (Windows amd64)
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o gaia.exe ./cmd/gaia/

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gaia.exe
