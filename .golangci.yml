# GAIA — Golangci-lint configuration
# Baseline for CI: govet, staticcheck, errcheck, gosimple, unused, ineffassign
# Run: golangci-lint run

version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
